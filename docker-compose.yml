version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: urbanx-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - urbanx-network

volumes:
  postgres_data:

networks:
  urbanx-network:
    driver: bridge
